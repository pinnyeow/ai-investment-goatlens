name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 min (GitHub delays cron ~2-3x, so actual ~10-15 min)
  workflow_dispatch:          # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping GOATlens
        run: curl -fsS https://goatlens.onrender.com/health
